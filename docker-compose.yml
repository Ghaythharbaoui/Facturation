# docker-compose.yml
version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: facturestock_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./BackEnd
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: facturestock_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2Vucy1taW4tMzItY2hhcnM=
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
